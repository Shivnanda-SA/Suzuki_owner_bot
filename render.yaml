# Render Blueprint — Postgres for sessions/feedback; Chroma vectors live on API disk (add persistent disk for CHROMA_PERSIST_DIR in prod).
# Normalize DATABASE_URL to postgresql+psycopg:// in app settings if needed. Set OPENAI_API_KEY, NEXT_PUBLIC_API_URL.

services:
  - type: web
    name: suzuki-owner-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: suzuki-owner-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: APP_ENV
        value: production

  - type: web
    name: suzuki-owner-web
    runtime: docker
    dockerfilePath: ./web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: suzuki-owner-db
    databaseName: suzuki_bot
    user: suzuki_owner
    plan: free
